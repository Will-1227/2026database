<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="gate.title">保衛室 — 今日訪客</title>
  <script src="i18n.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #1a1d2e;
      color: #eaeaea;
      min-height: 100vh;
      padding: 16px;
    }
    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 14px 22px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar h1 { font-size: 1.3rem; }
    .topbar .clock { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.04em; }
    .topbar .user { display: flex; align-items: center; gap: 10px; font-size: 0.88rem; }
    .topbar button {
      background: rgba(255,255,255,0.2);
      color: white; border: none;
      padding: 7px 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem;
    }
    .topbar button:hover { background: rgba(255,255,255,0.3); }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: #252840;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
    }
    .panel h2 {
      font-size: 1rem;
      color: #aab;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* 掃描器 */
    #scanner { width: 100%; max-width: 320px; margin: 0 auto; }
    .scan-result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      background: #1a1d2e;
      font-size: 0.92rem;
      line-height: 1.6;
      min-height: 60px;
    }
    .scan-result.success { background: #1b3a2e; color: #7fe9a8; }
    .scan-result.error { background: #3a1b1f; color: #ff8b94; }

    .scanner-actions { margin-top: 12px; display: flex; gap: 8px; }
    .scanner-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      background: #667eea;
      color: white;
    }
    .scanner-actions button:hover { opacity: 0.9; }
    .scanner-actions button.stop { background: #666; }

    /* 訪客清單 */
    .visitor-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #34374e;
    }
    .visitor-row:last-child { border-bottom: none; }
    .visitor-row .name { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .visitor-row .meta { font-size: 0.85rem; color: #aab; margin-top: 3px; line-height: 1.5; }
    .status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 6px;
    }
    .status-pending   { background: #4a3a1d; color: #ffb74d; }
    .status-approved  { background: #1d4a2e; color: #81c784; }
    .status-checkedIn { background: #1d3a4a; color: #64b5f6; }
    .status-cancelled { background: #4a1d24; color: #ef5350; }
    .visitor-row .actions button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
    }
    .btn-checkin { background: #2e7d32; }
    .btn-checkout { background: #555; }

    .empty { text-align: center; color: #667; padding: 30px; font-size: 0.95rem; }

    /* 登入畫面 */
    .login-card {
      background: #252840;
      border-radius: 16px;
      padding: 40px 30px;
      max-width: 380px;
      margin: 80px auto 0;
      text-align: center;
    }
    .login-card h2 { margin-bottom: 12px; color: #fff; }
    .login-card p { color: #aab; margin-bottom: 24px; font-size: 0.9rem; }
    .google-btn {
      width: 100%;
      padding: 14px;
      background: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #555;
    }
    .footer-link { text-align: center; margin-top: 18px; font-size: 0.85rem; }
    .footer-link a { color: #9aaef0; text-decoration: none; }
    .brand-bar { text-align: center; margin-bottom: 14px; }
    .brand-logo {
      max-width: 220px;
      width: 70%;
      height: auto;
    }
    .brand-logo-mini {
      height: 30px;
      width: auto;
      vertical-align: middle;
      margin-right: 8px;
    }

    .badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: 8px;
    }

    /* html5-qrcode 內部樣式覆寫 */
    #scanner button { background: #667eea !important; color: white !important; border-radius: 8px !important; }
    #scanner select { color: #333 !important; }

    /* VIP 警示區 */
    .vip-panel {
      background: linear-gradient(135deg, #4a3a1d, #6b4a1e);
      border: 2px solid #ffc107;
      box-shadow: 0 4px 24px rgba(255, 193, 7, 0.25);
      margin-bottom: 16px;
    }
    .vip-panel h2 { color: #ffd54f; }
    .vip-card {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 12px;
      background: rgba(0,0,0,0.18);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .vip-card:last-child { margin-bottom: 0; }
    .vip-photo {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #34374e;
      overflow: hidden;
      border: 2px solid #ffc107;
      flex-shrink: 0;
    }
    .vip-photo img { width: 100%; height: 100%; object-fit: cover; }
    .vip-info { line-height: 1.5; min-width: 0; }
    .vip-info .vip-name { font-size: 1.05rem; font-weight: 700; color: #fff; }
    .vip-info .vip-name .star { color: #ffd54f; margin-right: 4px; }
    .vip-info .vip-meta { font-size: 0.85rem; color: #ddc; }
    .vip-info .vip-sop {
      font-size: 0.82rem;
      color: #fff8e1;
      background: rgba(255, 193, 7, 0.2);
      padding: 4px 8px;
      border-radius: 6px;
      margin-top: 4px;
      display: inline-block;
    }
    .vip-info .vip-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      margin-left: 6px;
    }

    /* 訪客列：VIP 命中 */
    .visitor-row.is-vip {
      border-left: 4px solid #ffc107;
      padding-left: 10px;
      background: rgba(255, 193, 7, 0.06);
      border-radius: 6px;
      margin: 4px 0;
    }
    .visitor-row .vip-tag {
      display: inline-block;
      background: linear-gradient(135deg, #ffd54f, #ffa726);
      color: #4a2c00;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 6px;
    }

    /* 掃描結果：VIP 標識 */
    .scan-result.vip-hit {
      background: linear-gradient(135deg, #4a3a1d, #6b4a1e);
      color: #fff;
      border: 2px solid #ffc107;
    }
    .scan-result .vip-banner {
      font-size: 1rem;
      font-weight: 700;
      color: #ffd54f;
      margin-bottom: 6px;
    }
    .scan-result .vip-sop-inline {
      background: rgba(255, 193, 7, 0.2);
      padding: 6px 10px;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 0.9rem;
      color: #fff8e1;
    }
  </style>
</head>
<body>

  <div id="loginView" style="display:none;">
    <div class="login-card">
      <div class="brand-bar">
        <img class="brand-logo" src="assets/jye-shing-logo.png" alt="杰興工業 JYE SHING INDUSTRIAL CO.,LTD">
      </div>
      <div style="text-align:center; margin-bottom:14px;">
        <div class="lang-switch dark">
          <button data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
          <button data-lang="en"    onclick="setLang('en')">EN</button>
          <button data-lang="vi"    onclick="setLang('vi')">TIẾNG VIỆT</button>
        </div>
      </div>
      <h2>🛡 <span data-i18n="gate.loginTitle">保衛室登入</span></h2>
      <p data-i18n="gate.loginDesc">請以保衛室專用 Google 帳號登入</p>
      <button class="google-btn" onclick="signIn()" data-i18n="common.signIn">使用 Google 登入</button>
      <div class="footer-link"><a href="visitor-index.html" data-i18n="common.back">← 回首頁</a></div>
    </div>
  </div>

  <div id="mainView" style="display:none;">
    <div class="topbar">
      <h1><img class="brand-logo-mini" src="assets/jye-shing-logo.png" alt="">🛡 <span data-i18n="gate.title">保衛室 — 今日訪客</span> <span id="todayCount" class="badge">0</span></h1>
      <div class="clock" id="clock">--:--:--</div>
      <div class="user">
        <div class="lang-switch dark">
          <button data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
          <button data-lang="en"    onclick="setLang('en')">EN</button>
          <button data-lang="vi"    onclick="setLang('vi')">TIẾNG VIỆT</button>
        </div>
        <span id="userEmail"></span>
        <button onclick="signOutClick()" data-i18n="common.signOut">登出</button>
      </div>
    </div>

    <!-- 今日 VIP 警示區（沒命中時隱藏） -->
    <div id="vipPanel" class="panel vip-panel" style="display:none;">
      <h2 id="vipPanelTitle">🌟 今日 VIP（<span id="vipCount">0</span> 位）</h2>
      <div id="vipList"></div>
    </div>

    <div class="layout">
      <!-- 左欄：掃 QR + 結果 -->
      <div>
        <div class="panel">
          <h2 data-i18n="gate.scanTitle">📷 掃描 QR Code</h2>
          <div id="scanner"></div>
          <div class="scanner-actions">
            <button id="startBtn" onclick="startScanner()" data-i18n="gate.scanStart">啟動相機</button>
            <button id="stopBtn" class="stop" onclick="stopScanner()" style="display:none;" data-i18n="gate.scanStop">停止</button>
          </div>
          <div id="scanResult" class="scan-result" data-i18n="gate.scanIdle">尚未掃描</div>
        </div>
      </div>

      <!-- 右欄：今日清單 -->
      <div>
        <div class="panel">
          <h2 data-i18n="gate.todayList">📋 今日預約名單</h2>
          <div id="visitorList"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, updateDoc, serverTimestamp, Timestamp }
      from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7uHcuYxxo4YFyGj959grg8zlkT1wG4o8",
      authDomain: "my-firebase-tools.firebaseapp.com",
      projectId: "my-firebase-tools",
      storageBucket: "my-firebase-tools.firebasestorage.app",
      messagingSenderId: "757246006318",
      appId: "1:757246006318:web:3d5dd95d646eeb38927bbf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const STATUS_CLS = {
      pending:    "status-pending",
      approved:   "status-approved",
      checkedIn:  "status-checkedIn",
      checkedOut: "status-checkedIn",
      cancelled:  "status-cancelled"
    };
    const STATUS_KEY = {
      pending:    "status.pending",
      approved:   "status.approved",
      checkedIn:  "status.checkedIn",
      checkedOut: "status.checkedOut",
      cancelled:  "status.cancelled"
    };

    let todayVisitors = [];
    let activeVips = [];

    // VIP 比對：
    //  1) 訪客自身 isVip=true（員工邀約時勾選）→ 用訪客自己的資料當 VIP
    //  2) 否則比對 VIP 名冊姓名（trim + 不分大小寫）
    function normName(n) {
      return String(n || "").trim().toLowerCase();
    }
    function matchVip(visitor) {
      if (!visitor) return null;
      if (visitor.isVip === true) {
        return {
          name: visitor.name,
          title: "",
          company: visitor.company || "",
          photoFileId: visitor.vipPhotoFileId || "",
          photoData: visitor.vipPhotoData || "",
          greetingSOP: visitor.note || "",
          ownerEmail: visitor.hostEmail || ""
        };
      }
      const target = normName(visitor.name);
      if (!target) return null;
      for (const vip of activeVips) {
        if (vip.active === false) continue;
        if (vip.name && normName(vip.name) === target) return vip;
      }
      return null;
    }
    // VIP 大頭照 src：優先 base64 data URL（員工邀約即拍）、退回 Drive file ID（永久名冊）
    function vipPhotoSrc(vip) {
      if (vip.photoData) return vip.photoData;
      if (vip.photoFileId) return `https://lh3.googleusercontent.com/d/${vip.photoFileId}=s200`;
      return "";
    }

    function pad(n) { return String(n).padStart(2, "0"); }
    function fmtTime(ts) {
      if (!ts || !ts.toDate) return "—";
      const d = ts.toDate();
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    // 時鐘
    function updateClock() {
      const d = new Date();
      document.getElementById("clock").textContent =
        `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function renderList() {
      const el = document.getElementById("visitorList");
      document.getElementById("todayCount").textContent = todayVisitors.length;

      // 預先計算每位訪客的 VIP 比對結果
      const enriched = todayVisitors.map(v => ({ ...v, _vip: matchVip(v) }));

      // ── 上方 VIP 警示區 ──
      const vipHits = enriched.filter(v => v._vip && v.status !== "cancelled");
      const vipPanel = document.getElementById("vipPanel");
      const vipList = document.getElementById("vipList");
      document.getElementById("vipPanelTitle").innerHTML = t("gate.vipPanel", { count: `<span id="vipCount">${vipHits.length}</span>` });
      if (vipHits.length === 0) {
        vipPanel.style.display = "none";
      } else {
        vipPanel.style.display = "block";
        vipList.innerHTML = vipHits.map(v => {
          const vip = v._vip;
          const cls = STATUS_CLS[v.status] || STATUS_CLS.pending;
          const labelText = t(STATUS_KEY[v.status] || STATUS_KEY.pending);
          return `
            <div class="vip-card">
              <div class="vip-photo">
                ${(() => { const src = vipPhotoSrc(vip); return src ? `<img src="${src}" alt="" onerror="this.style.display='none'">` : ""; })()}
              </div>
              <div class="vip-info">
                <div class="vip-name">
                  <span class="star">⭐</span>${escapeHtml(vip.name)}
                  <span class="vip-status status ${cls}">${escapeHtml(labelText)}</span>
                </div>
                <div class="vip-meta">
                  ${escapeHtml(vip.title || "")} ${escapeHtml(vip.company || "")}　·　🕐 ${escapeHtml(t("gate.metaVisit"))} ${fmtTime(v.visitAt)}${v.checkedInAt ? " · " + escapeHtml(t("gate.metaArrival")) + " " + fmtTime(v.checkedInAt) : ""}
                </div>
                <div class="vip-meta">${escapeHtml(t("gate.metaHost"))}${escapeHtml(v.hostName)}${vip.ownerEmail ? "（" + escapeHtml(vip.ownerEmail) + "）" : ""}</div>
                ${vip.greetingSOP ? `<div class="vip-sop">💡 ${escapeHtml(vip.greetingSOP)}</div>` : ""}
              </div>
              <div></div>
            </div>
          `;
        }).join("");
      }

      // ── 下方今日清單 ──
      if (enriched.length === 0) {
        el.innerHTML = `<div class="empty">${escapeHtml(t("gate.todayEmpty"))}</div>`;
        return;
      }

      const order = { checkedIn: 0, approved: 1, pending: 2, checkedOut: 3, cancelled: 4 };
      const sorted = [...enriched].sort((a,b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

      el.innerHTML = sorted.map(v => {
        const cls = STATUS_CLS[v.status] || STATUS_CLS.pending;
        const labelText = t(STATUS_KEY[v.status] || STATUS_KEY.pending);
        const isVip = !!v._vip;
        let actionBtn = "";
        if (v.status === "approved") {
          actionBtn = `<button class="btn-checkin" onclick="checkIn('${v.id}')">${escapeHtml(t("gate.btnCheckIn"))}</button>`;
        } else if (v.status === "checkedIn") {
          actionBtn = `<button class="btn-checkout" onclick="checkOut('${v.id}')">${escapeHtml(t("gate.btnCheckOut"))}</button>`;
        }
        return `
          <div class="visitor-row${isVip ? " is-vip" : ""}">
            <div>
              <div>
                <span class="name">${escapeHtml(v.name)}</span>
                ${isVip ? `<span class="vip-tag">⭐ ${escapeHtml(t("gate.vipFlag"))}</span>` : ""}
                <span class="status ${cls}">${escapeHtml(labelText)}</span>
              </div>
              <div class="meta">
                🕐 ${escapeHtml(t("gate.metaVisit"))} ${fmtTime(v.visitAt)}${v.checkedInAt ? ` · ${escapeHtml(t("gate.metaArrival"))} ${fmtTime(v.checkedInAt)}` : ""}${v.checkedOutAt ? ` · ${escapeHtml(t("gate.metaLeave"))} ${fmtTime(v.checkedOutAt)}` : ""}
                <br>${escapeHtml(v.company || t("common.individual"))} · ${escapeHtml(t("gate.metaHost"))}${escapeHtml(v.hostName)}
                ${v.plateNumber ? "<br>🚗 " + escapeHtml(v.plateNumber) : ""}
              </div>
            </div>
            <div class="actions">${actionBtn}</div>
          </div>
        `;
      }).join("");
    }

    document.addEventListener("i18n:changed", renderList);

    window.checkIn = async function(id) {
      try {
        await updateDoc(doc(db, "visitors", id), {
          status: "checkedIn",
          checkedInAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      } catch (e) { alert(t("err.checkInFail", { msg: e.message })); }
    };

    window.checkOut = async function(id) {
      try {
        await updateDoc(doc(db, "visitors", id), {
          status: "checkedOut",
          checkedOutAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
      } catch (e) { alert(t("err.checkOutFail", { msg: e.message })); }
    };

    // ---- QR 掃描 ----
    let html5QrCode = null;

    function showScanResult(html, type = "") {
      const el = document.getElementById("scanResult");
      el.innerHTML = html;
      el.className = "scan-result" + (type ? " " + type : "");
    }

    function extractToken(text) {
      // QR 編碼為 visitor-confirm.html?token=xxx，但也接受純 token
      try {
        const u = new URL(text);
        const t = u.searchParams.get("token");
        if (t) return t;
      } catch {}
      // 若不是 URL，把整段當 token
      return text.trim();
    }

    async function handleScanned(text) {
      const token = extractToken(text);
      if (!token) {
        showScanResult(escapeHtml(t("gate.scanCantParse")), "error");
        return;
      }
      const match = todayVisitors.find(v => v.qrToken === token);
      if (!match) {
        showScanResult(`${escapeHtml(t("gate.scanNotFound"))}<br><small>${escapeHtml(token).slice(0, 20)}…</small>`, "error");
        return;
      }
      const label = t(STATUS_KEY[match.status] || STATUS_KEY.pending);
      let action = "";
      if (match.status === "approved") {
        try {
          await updateDoc(doc(db, "visitors", match.id), {
            status: "checkedIn",
            checkedInAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
          action = "<br>" + escapeHtml(t("gate.scanAutoCheckIn"));
        } catch (e) {
          action = "<br>" + escapeHtml(t("gate.scanCheckInFail", { msg: e.message }));
        }
      } else if (match.status === "pending") {
        action = "<br>" + escapeHtml(t("gate.scanNotApproved"));
      } else if (match.status === "checkedIn") {
        action = "<br>" + escapeHtml(t("gate.scanAlreadyIn"));
      } else if (match.status === "cancelled") {
        action = "<br>" + escapeHtml(t("gate.scanCancelled"));
      }
      const vip = matchVip(match);
      const vipBanner = vip
        ? `<div class="vip-banner">⭐ ${escapeHtml(t("gate.vipFlag"))} — ${escapeHtml(vip.title || "")} ${escapeHtml(vip.name)}</div>`
        : "";
      const vipSop = vip && vip.greetingSOP
        ? `<div class="vip-sop-inline">💡 ${escapeHtml(vip.greetingSOP)}</div>`
        : "";
      const resultType = vip
        ? "vip-hit"
        : (match.status === "approved" || match.status === "checkedIn" ? "success" : "error");
      showScanResult(`
        ${vipBanner}
        <strong>${escapeHtml(match.name)}</strong> ・ ${label}<br>
        ${escapeHtml(match.company || "")} → ${escapeHtml(match.hostName)}
        ${action}
        ${vipSop}
      `, resultType);
    }

    window.startScanner = async function() {
      if (!window.Html5Qrcode) {
        alert(t("gate.scanLibMissing"));
        return;
      }
      try {
        html5QrCode = new Html5Qrcode("scanner");
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 240, height: 240 } },
          (decoded) => {
            handleScanned(decoded);
          },
          () => {} // 掃描錯誤忽略
        );
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "block";
      } catch (e) {
        alert(t("gate.scanFailedStart", { msg: e.message }));
      }
    };

    window.stopScanner = async function() {
      if (html5QrCode) {
        try { await html5QrCode.stop(); await html5QrCode.clear(); } catch {}
        html5QrCode = null;
      }
      document.getElementById("startBtn").style.display = "block";
      document.getElementById("stopBtn").style.display = "none";
    };

    window.signIn = async function() {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) { alert(t("err.signInFail", { msg: e.message })); }
    };

    window.signOutClick = async function() {
      if (html5QrCode) await window.stopScanner();
      await signOut(auth);
    };

    // ---- 監聽今日訪客 + VIP 名冊 ----
    let unsubVisitors = null;
    let unsubVips = null;

    function subscribeToday() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);

      const q = query(
        collection(db, "visitors"),
        where("visitAt", ">=", Timestamp.fromDate(start)),
        where("visitAt", "<=", Timestamp.fromDate(end)),
        orderBy("visitAt", "asc")
      );
      unsubVisitors = onSnapshot(q, snap => {
        todayVisitors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList();
      }, err => {
        console.error(err);
        document.getElementById("visitorList").innerHTML =
          `<div class="empty">${escapeHtml(t("confirm.loadFailed", { msg: err.message }))}</div>`;
      });
    }

    function subscribeVips() {
      // 不在 query 加 active 過濾，client side 處理（避免 index 需求）
      unsubVips = onSnapshot(collection(db, "vips"), snap => {
        activeVips = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderList();  // VIP 變動時重 render
      }, err => console.error("vips read failed:", err));
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("mainView").style.display = "block";
        document.getElementById("userEmail").textContent = user.email;
        subscribeToday();
        subscribeVips();
      } else {
        if (unsubVisitors) { unsubVisitors(); unsubVisitors = null; }
        if (unsubVips) { unsubVips(); unsubVips = null; }
        activeVips = [];
        todayVisitors = [];
        document.getElementById("loginView").style.display = "block";
        document.getElementById("mainView").style.display = "none";
      }
    });
  </script>
</body>
</html>
