<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="invite.loginTitle">員工邀約訪客</title>
  <script src="i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .header { text-align: center; margin-bottom: 18px; }
    .emoji { font-size: 2.6rem; margin-bottom: 8px; }
    h1 { font-size: 1.55rem; color: #333; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 0.92rem; }
    .topbar-mini {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #f5f5f7;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      color: #555;
    }
    .topbar-mini button {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    label {
      display: block;
      font-size: 0.88rem;
      color: #555;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    label .req { color: #e53935; }
    label .hint { font-weight: 400; color: #aaa; font-size: 0.78rem; margin-left: 4px; }
    input, textarea {
      width: 100%;
      font-size: 1rem;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #333;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }
    textarea { resize: vertical; min-height: 60px; }
    /* iOS Safari 預設把 datetime-local 渲染成灰色按鈕，會異常寬；取消原生樣式統一外觀 */
    input[type="datetime-local"] {
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
      min-height: 46px;
    }
    .row { display: flex; gap: 10px; }
    .row > div { flex: 1; min-width: 0; }
    @media (max-width: 480px) {
      .row { flex-direction: column; gap: 0; }
    }
    button.primary {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      font-size: 1.05rem;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button.primary:hover { opacity: 0.92; transform: translateY(-1px); }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error {
      margin-top: 12px;
      padding: 12px;
      background: #ffebee;
      border-radius: 10px;
      color: #c62828;
      font-size: 0.9rem;
      display: none;
    }
    .footer-link { text-align: center; margin-top: 18px; font-size: 0.85rem; }
    .footer-link a { color: #667eea; text-decoration: none; }

    /* VIP 勾選 */
    .vip-toggle {
      margin-top: 18px;
      padding: 14px;
      background: linear-gradient(135deg, #fff8e1, #fff3cd);
      border: 2px solid #ffd54f;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .vip-toggle input { width: auto; transform: scale(1.3); cursor: pointer; }
    .vip-toggle .vip-label {
      flex: 1;
      font-weight: 600;
      color: #6b4a1e;
      font-size: 0.98rem;
    }
    .vip-toggle .vip-hint { font-size: 0.78rem; color: #8b6f4a; font-weight: 400; }
    .vip-section {
      margin-top: 12px;
      padding: 14px;
      background: #fffbe6;
      border-radius: 10px;
      display: none;
    }
    .vip-section.open { display: block; }
    .vip-photo-preview {
      margin-top: 8px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid #ffc107;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 0.8rem;
      overflow: hidden;
      text-align: center;
    }
    .vip-photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .photo-pick-btn {
      width: 100%;
      margin-top: 6px;
      padding: 12px;
      background: linear-gradient(135deg, #ffb347, #ffcc33);
      color: #4a2c00;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .photo-pick-btn:hover { opacity: 0.92; }
    .photo-tip { margin-top: 4px; font-size: 0.78rem; color: #8b6f4a; line-height: 1.5; }
    .photo-meta { margin-top: 6px; font-size: 0.78rem; color: #888; }

    /* 邀約成功確認區 */
    .confirm-header { text-align: center; margin-bottom: 18px; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      background: #e8f5e9;
      color: #2e7d32;
      margin-top: 4px;
    }
    .qr-wrap {
      background: #fafafa;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      margin: 16px 0;
    }
    #qrcode { display: inline-block; padding: 8px; background: white; border-radius: 8px; }
    .info-block {
      background: #f5f5f7;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 0.92rem;
      line-height: 1.7;
      color: #444;
    }
    .info-block .info-row { display: flex; gap: 8px; }
    .info-block .label { color: #888; min-width: 64px; }
    .info-block .value { font-weight: 600; color: #333; flex: 1; }
    .actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn {
      flex: 1;
      padding: 14px;
      font-size: 0.98rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      color: white;
    }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); }
    .btn-secondary { background: #555; }
    .share-link {
      margin-top: 14px;
      padding: 12px;
      background: #eef1ff;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #444;
      word-break: break-all;
      line-height: 1.55;
    }
    .share-link button {
      margin-top: 6px;
      padding: 6px 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      width: auto;
    }
    .hint {
      margin-top: 14px;
      padding: 12px;
      background: #fff8e1;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #795548;
      line-height: 1.55;
    }

    /* Logo 移到白卡外 */
    .page-wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .brand-logo {
      display: block;
      height: 150px;
      width: auto;
      max-width: 100%;
    }

    /* 登入畫面 */
    .login-card { text-align: center; }
    .google-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: white;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #555;
    }
    .google-btn:hover { background: #f9f9f9; }
  </style>
</head>
<body>

  <div class="page-wrap">
    <img class="brand-logo" src="assets/jye-shing-logo.png" alt="杰興工業 JYE SHING INDUSTRIAL CO.,LTD">

  <div id="loginView" class="card" style="display:none;">
    <div class="login-card">
      <div style="text-align:center; margin-bottom:14px;">
        <div class="lang-switch">
          <button data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
          <button data-lang="en"    onclick="setLang('en')">EN</button>
          <button data-lang="vi"    onclick="setLang('vi')">TIẾNG VIỆT</button>
        </div>
      </div>
      <div class="emoji">📨</div>
      <h1 data-i18n="invite.loginTitle">員工邀約訪客</h1>
      <p class="subtitle" data-i18n="invite.loginDesc">登入企業 Google 帳號後即可主動建立預約</p>
      <button class="google-btn" onclick="signIn()" data-i18n="common.signIn">使用 Google 登入</button>
      <div class="footer-link"><a href="visitor-index.html" data-i18n="common.back">← 回首頁</a></div>
    </div>
  </div>

  <!-- 表單 -->
  <div id="formCard" class="card" style="display:none;">
    <div class="topbar-mini">
      <span>👤 <span id="userEmail"></span></span>
      <div class="lang-switch">
        <button data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
        <button data-lang="en"    onclick="setLang('en')">EN</button>
        <button data-lang="vi"    onclick="setLang('vi')">TIẾNG VIỆT</button>
      </div>
      <button onclick="signOutClick()" data-i18n="common.signOut">登出</button>
    </div>

    <div class="header">
      <div class="emoji">📨</div>
      <h1 data-i18n="invite.title">邀約訪客</h1>
      <p class="subtitle" data-i18n="invite.subtitle">直接核可，免再經員工核可流程</p>
    </div>

    <label><span data-i18n="invite.visitorName">訪客姓名</span> <span class="req">*</span></label>
    <input type="text" id="name" placeholder="王董事長" data-i18n-placeholder="invite.visitorNamePh" maxlength="40">

    <div class="row">
      <div>
        <label data-i18n="book.phone">電話</label>
        <input type="tel" id="phone" placeholder="0912345678" data-i18n-placeholder="book.phonePh" maxlength="20">
      </div>
      <div>
        <label data-i18n="book.email">Email</label>
        <input type="email" id="email" placeholder="optional" data-i18n-placeholder="book.emailPh" maxlength="60">
      </div>
    </div>

    <label data-i18n="book.company">公司 / 單位</label>
    <input type="text" id="company" placeholder="ABC 股份有限公司" data-i18n-placeholder="book.companyPh" maxlength="60">

    <div class="row">
      <div>
        <label><span data-i18n="book.visitAt">預計到訪</span> <span class="req">*</span></label>
        <input type="datetime-local" id="visitAt">
      </div>
      <div>
        <label data-i18n="book.plate">車牌（如有）</label>
        <input type="text" id="plateNumber" placeholder="ABC-1234" data-i18n-placeholder="book.platePh" maxlength="15">
      </div>
    </div>

    <label><span data-i18n="book.host">受訪員工</span> <span class="hint" data-i18n="invite.hostHint">預設為您</span></label>
    <input type="text" id="hostName" maxlength="40">

    <label><span data-i18n="common.note">備註</span> <span class="hint" data-i18n="invite.noteHint">VIP 勾選時亦作為接待 SOP</span></label>
    <textarea id="note" placeholder="會議主題、地點、接待 SOP 等" data-i18n-placeholder="invite.notePh" maxlength="200"></textarea>

    <label class="vip-toggle" for="isVip">
      <input type="checkbox" id="isVip" onchange="toggleVipSection()">
      <div>
        <div class="vip-label" data-i18n="invite.vipToggle">🌟 標記為 VIP 訪客</div>
        <div class="vip-hint" data-i18n="invite.vipHint">保衛室控台會即時顯示警示與大頭照</div>
      </div>
    </label>

    <div class="vip-section" id="vipSection">
      <label data-i18n="invite.vipPhotoLabel">VIP 大頭照（選填）</label>
      <button type="button" class="photo-pick-btn" onclick="document.getElementById('vipPhotoFile').click()" data-i18n="invite.vipPhotoBtn">
        📷 拍照 / 選擇相片
      </button>
      <input type="file" id="vipPhotoFile" accept="image/*" style="display:none" onchange="onVipPhotoSelected(event)">
      <div class="photo-tip" data-i18n="invite.vipPhotoTip">手機開啟會跳「拍照 / 照片圖庫 / 選取檔案」原生選單（自動壓縮）</div>
      <div class="vip-photo-preview" id="vipPhotoPreview" data-i18n="invite.vipPhotoEmpty">尚未選擇照片</div>
      <div class="photo-meta" id="vipPhotoMeta"></div>
    </div>

    <div class="error" id="errorMsg"></div>

    <button class="primary" id="submitBtn" onclick="submitInvite()" data-i18n="invite.submit">建立邀約並取得 QR →</button>

    <div class="footer-link"><a href="visitor-index.html" data-i18n="common.back">← 回首頁</a></div>
  </div>

  <!-- 成功確認 -->
  <div id="confirmCard" class="card" style="display:none;">
    <div class="topbar-mini">
      <span>👤 <span id="userEmail2"></span></span>
      <div class="lang-switch">
        <button data-lang="zh-TW" onclick="setLang('zh-TW')">繁中</button>
        <button data-lang="en"    onclick="setLang('en')">EN</button>
        <button data-lang="vi"    onclick="setLang('vi')">TIẾNG VIỆT</button>
      </div>
      <button onclick="signOutClick()" data-i18n="common.signOut">登出</button>
    </div>

    <div class="confirm-header">
      <div class="emoji">✅</div>
      <h1 data-i18n="invite.confirmTitle">邀約已建立</h1>
      <div class="status-badge" data-i18n="status.approvedAuto">已核可（自動）</div>
    </div>

    <div class="qr-wrap">
      <div id="qrcode"></div>
      <p style="margin-top:12px; color:#888; font-size:0.85rem;" data-i18n="invite.shareTitle">將此 QR 或下方連結傳給訪客</p>
    </div>

    <div class="info-block" id="infoBlock"></div>

    <div class="actions">
      <a id="downloadBtn" class="btn btn-primary" download="visitor-qr.png" data-i18n="confirm.downloadQr">⬇ 下載 QR</a>
      <button class="btn btn-secondary" onclick="copyLink()" data-i18n="common.copyLink">📎 複製連結</button>
    </div>

    <div class="share-link" id="shareLinkBox">
      <strong data-i18n="confirm.shareLink">可分享連結：</strong><br>
      <span id="shareLink"></span>
    </div>

    <div class="hint" data-i18n-html="invite.hint">
      💡 把 QR 圖片或連結貼到 LINE / Slack / Email 給訪客即可。<br>
      訪客到訪當日由保衛室掃描 QR 完成報到。
    </div>

    <div class="footer-link">
      <a href="#" onclick="startNew(); return false;" data-i18n="invite.inviteAgain">+ 再邀約一位</a>　·　<a href="visitor-index.html" data-i18n="common.back">回首頁</a>
    </div>
  </div>
  </div><!-- /.page-wrap -->

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp, Timestamp }
      from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7uHcuYxxo4YFyGj959grg8zlkT1wG4o8",
      authDomain: "my-firebase-tools.firebaseapp.com",
      projectId: "my-firebase-tools",
      storageBucket: "my-firebase-tools.firebasestorage.app",
      messagingSenderId: "757246006318",
      appId: "1:757246006318:web:3d5dd95d646eeb38927bbf"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    // 拍照 / 相簿選擇 → 客戶端壓縮 → base64
    let vipPhotoData = "";  // data:image/jpeg;base64,...

    window.toggleVipSection = function() {
      const checked = document.getElementById("isVip").checked;
      document.getElementById("vipSection").classList.toggle("open", checked);
    };

    function compressImage(file, maxDim = 320, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("讀取檔案失敗"));
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              const ratio = Math.min(maxDim / width, maxDim / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };
          img.onerror = () => reject(new Error("不支援的圖片格式"));
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    window.onVipPhotoSelected = async function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const previewEl = document.getElementById("vipPhotoPreview");
      const metaEl = document.getElementById("vipPhotoMeta");
      previewEl.textContent = t("common.processing");
      metaEl.textContent = "";
      try {
        vipPhotoData = await compressImage(file, 320, 0.7);
        previewEl.innerHTML = `<img src="${vipPhotoData}">`;
        const kb = Math.round((vipPhotoData.length * 0.75) / 1024);
        metaEl.textContent = t("common.kbCompressed", { kb });
      } catch (err) {
        vipPhotoData = "";
        previewEl.textContent = "⚠ " + err.message;
        metaEl.textContent = "";
      }
    };

    function setDefaultTime() {
      const d = new Date(Date.now() + 60 * 60 * 1000);
      d.setMinutes(0, 0, 0);
      const pad = n => String(n).padStart(2, "0");
      document.getElementById("visitAt").value =
        `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    let bookingState = null;

    window.startNew = function() {
      ["name","phone","email","company","plateNumber","note"].forEach(id => {
        document.getElementById(id).value = "";
      });
      document.getElementById("isVip").checked = false;
      document.getElementById("vipSection").classList.remove("open");
      document.getElementById("vipPhotoFile").value = "";
      document.getElementById("vipPhotoPreview").textContent = t("invite.vipPhotoEmpty");
      document.getElementById("vipPhotoMeta").textContent = "";
      vipPhotoData = "";
      document.getElementById("errorMsg").style.display = "none";
      setDefaultTime();
      document.getElementById("confirmCard").style.display = "none";
      document.getElementById("formCard").style.display = "block";
      window.scrollTo(0, 0);
    };

    window.submitInvite = async function() {
      document.getElementById("errorMsg").style.display = "none";
      const name = document.getElementById("name").value.trim();
      const hostName = document.getElementById("hostName").value.trim();
      const visitAtStr = document.getElementById("visitAt").value;

      if (!name) return showError(t("err.fillVisitorName"));
      if (!hostName) return showError(t("err.fillHost"));
      if (!visitAtStr) return showError(t("err.fillVisitAt"));

      const visitAt = new Date(visitAtStr);
      if (isNaN(visitAt.getTime())) return showError(t("err.badDateTime"));

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = t("common.processing");

      try {
        const qrToken = (crypto.randomUUID ? crypto.randomUUID()
                         : Math.random().toString(36).slice(2) + Date.now().toString(36));
        const isVip = document.getElementById("isVip").checked;
        const data = {
          name,
          phone: document.getElementById("phone").value.trim(),
          email: document.getElementById("email").value.trim().toLowerCase(),
          company: document.getElementById("company").value.trim(),
          hostName,
          hostEmail: auth.currentUser?.email || "",
          visitAt: Timestamp.fromDate(visitAt),
          plateNumber: document.getElementById("plateNumber").value.trim(),
          note: document.getElementById("note").value.trim(),
          isVip,
          vipPhotoData: isVip ? vipPhotoData : "",
          status: "approved",
          source: "staff-invited",
          qrToken,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          approvedAt: serverTimestamp(),
          approvedBy: auth.currentUser?.email || "",
          checkedInAt: null,
          checkedOutAt: null
        };
        await addDoc(collection(db, "visitors"), data);
        showConfirmation(qrToken, data, visitAt);
      } catch (e) {
        showError(t("err.createFail", { msg: e.message }));
      } finally {
        btn.disabled = false;
        btn.textContent = t("invite.submit");
      }
    };

    function buildShareUrl(qrToken) {
      const proto = location.protocol;
      if (proto !== "http:" && proto !== "https:") return null;
      const base = location.href.split("?")[0].replace(/staff-invite\.html$/, "");
      return `${base}visitor-confirm.html?token=${encodeURIComponent(qrToken)}`;
    }

    function showConfirmation(qrToken, data, visitAt) {
      bookingState = { qrToken, data, visitAt };

      document.getElementById("formCard").style.display = "none";
      document.getElementById("confirmCard").style.display = "block";
      window.scrollTo(0, 0);

      const shareUrl = buildShareUrl(qrToken);
      const shareLinkBox = document.getElementById("shareLinkBox");
      if (shareUrl) {
        document.getElementById("shareLink").textContent = shareUrl;
        shareLinkBox.style.display = "block";
      } else {
        shareLinkBox.style.display = "none";
      }

      const fmt = d => {
        const pad = n => String(n).padStart(2, "0");
        return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      };
      document.getElementById("infoBlock").innerHTML = `
        <div class="info-row"><span class="label">${t("confirm.guestLabel")}</span><span class="value">${escapeHtml(data.name)}</span></div>
        <div class="info-row"><span class="label">${t("confirm.companyLabel")}</span><span class="value">${escapeHtml(data.company || "—")}</span></div>
        <div class="info-row"><span class="label">${t("confirm.hostLabel")}</span><span class="value">${escapeHtml(data.hostName)}</span></div>
        <div class="info-row"><span class="label">${t("confirm.timeLabel")}</span><span class="value">${fmt(visitAt)}</span></div>
        ${data.plateNumber ? `<div class="info-row"><span class="label">${t("confirm.plateLabel")}</span><span class="value">${escapeHtml(data.plateNumber)}</span></div>` : ""}
      `;

      const qrContent = shareUrl || qrToken;
      const qrEl = document.getElementById("qrcode");
      qrEl.innerHTML = "";
      try {
        const qr = qrcode(0, "M");
        qr.addData(qrContent);
        qr.make();
        const moduleCount = qr.getModuleCount();
        const cellSize = 16;
        const margin = 4 * cellSize;
        const canvas = document.createElement("canvas");
        canvas.width = canvas.height = moduleCount * cellSize + margin * 2;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000000";
        for (let r = 0; r < moduleCount; r++) {
          for (let c = 0; c < moduleCount; c++) {
            if (qr.isDark(r, c)) ctx.fillRect(margin + c * cellSize, margin + r * cellSize, cellSize, cellSize);
          }
        }
        canvas.style.width = "240px";
        canvas.style.height = "240px";
        canvas.style.display = "block";
        qrEl.appendChild(canvas);
        const a = document.getElementById("downloadBtn");
        a.href = canvas.toDataURL("image/png");
        a.download = `invite-${data.name}.png`;
      } catch (err) {
        qrEl.innerHTML = `<div style="padding:30px; color:#888;">${escapeHtml(t("confirm.qrFailed", { msg: err.message }))}</div>`;
      }
    }

    window.copyLink = async function() {
      const text = document.getElementById("shareLink").textContent;
      if (!text) { return; }
      try {
        await navigator.clipboard.writeText(text);
        alert(t("common.copied"));
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); alert(t("common.copied")); } catch { alert(t("common.copied")); }
        ta.remove();
      }
    };

    window.signIn = async function() {
      try { await signInWithPopup(auth, new GoogleAuthProvider()); }
      catch (e) { alert(t("err.signInFail", { msg: e.message })); }
    };
    window.signOutClick = async function() { await signOut(auth); };

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById("loginView").style.display = "none";
        document.getElementById("formCard").style.display = "block";
        document.getElementById("userEmail").textContent = user.email;
        document.getElementById("userEmail2").textContent = user.email;
        // 預設受訪員工 = 自己（displayName 或 email 前綴）
        const hostInput = document.getElementById("hostName");
        if (!hostInput.value) {
          hostInput.value = user.displayName || (user.email || "").split("@")[0];
        }
        setDefaultTime();
      } else {
        document.getElementById("loginView").style.display = "block";
        document.getElementById("formCard").style.display = "none";
        document.getElementById("confirmCard").style.display = "none";
      }
    });
  </script>
</body>
</html>
